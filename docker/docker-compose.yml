version: '3.9'

services:
  backend:
    build: ./backend
    container_name: crkt11-backend
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/crkt11
      - SPRING_DATASOURCE_USERNAME=crkt11
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-crkt11pass}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: crkt11-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: crkt11-db
    environment:
      POSTGRES_DB: crkt11
      POSTGRES_USER: crkt11
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crkt11pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crkt11"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
